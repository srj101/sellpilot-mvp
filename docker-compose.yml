services:
  redis:
    image: redis:7-alpine
    container_name: sellpilot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: sellpilot-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=False
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  openwa:
    image: openwa/wapro:latest
    container_name: sellpilot-openwa
    restart: unless-stopped
    ports:
      - "2785:2785"
    profiles: ["whatsapp"]
    volumes:
      - openwa-data:/app/storages
    environment:
      - ENABLE_API=true

volumes:
  redis-data:
  chroma-data:
  openwa-data:
